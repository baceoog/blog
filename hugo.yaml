baseurl: https://baceoog.github.io/blog/
languageCode: zh-cn
theme: hugo-theme-stack
title: baceoog
copyright: baceoog

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: zh-cn

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: true

languages:
    # en:
    #     languageName: English
    #     title: Example Site
    #     weight: 1
    #     params:
    #         sidebar:
    #             subtitle: Example description
    zh-cn:
        languageName: zh-cn
        title: baceoog
        weight: 1
        params:
            sidebar:
                subtitle: 大大方方做事

services:
    # Change it to your Disqus shortname before using
    disqus:
        shortname: "hugo-theme-stack"
    # GA Tracking ID
    googleAnalytics:
        id:

pagination:
    pagerSize: 8

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: ./favicon.ico

    footer:
        since: 2025
        customText: 

    dateFormat:
        published: "Jan 02, 2006"
        lastUpdated: "Jan 02, 2006 15:04 MST" 


    enableGitInfo: true


    sidebar:
        emoji:
        # emoji: 🍥
        subtitle: Timely.
        avatar:
            enabled: true
            local: true
            src: img/avatar.png

    article:
        math: true
        toc: true
        readingTime: false
        license:
            enabled: true
            default: Copyright 2025 baceoog. All rights reserved.

    comments:
        enabled: true
        provider: utterances

        utterances:
            repo: baceoog/blog
            issueTerm: pathname
            label: Comment
            theme: github-dark


    widgets:
        homepage:
            - type: search
            # - type: archives
            #   params:
            #       limit: 5
            - type: categories
              params:
                  limit: 10
            # - type: tag-cloud
            #   params:
            #       limit: 10
        page:
            - type: toc

    opengraph:
        twitter:
            # Your Twitter username
            site:

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

### Custom menu
### See https://stack.jimmycai.com/config/menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main: []

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/baceoog
        #   weight: 1
          params:
              icon: brand-github

        - identifier: bilibili
          name: bilibili
          url: https://space.bilibili.com/441382883?spm_id_from=333.337.0.0
        #   weight: 2
          params:
              icon: brand-bilibili




related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: false
        lineNumbersInTable: true
        tabWidth: 4
